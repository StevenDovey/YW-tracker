<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Lookup — Rangipo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
     background:#f4f6f4;color:#222;padding:1.5rem}
.container{max-width:480px;margin:0 auto}
h1{font-size:1.35rem;color:#2c4a2c;margin-bottom:.2rem}
.subtitle{color:#666;font-size:.85rem;margin-bottom:1.4rem}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);
      padding:1.25rem;margin-bottom:1.25rem}
.controls{display:flex;align-items:flex-end;gap:.9rem;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:.3rem}
.field label{font-size:.75rem;font-weight:700;color:#555;
              text-transform:uppercase;letter-spacing:.05em}
input[type=number]{width:88px;padding:.45rem .6rem;border:1.5px solid #ccc;
                   border-radius:5px;font-size:.95rem}
input[type=number]:focus{outline:none;border-color:#3a7a3a;
                         box-shadow:0 0 0 2px rgba(58,122,58,.18)}
button{padding:.45rem 1.2rem;border:none;border-radius:5px;
       font-size:.88rem;font-weight:600;cursor:pointer;transition:background .15s}
#findBtn{background:#3a7a3a;color:#fff}
#findBtn:hover{background:#2f6430}
#resetBtn{background:#e0e0e0;color:#444}
#resetBtn:hover{background:#c8c8c8}
#message{font-size:.88rem;padding:.65rem .9rem;border-radius:6px;
         display:none;margin-bottom:.8rem}
#message.error{background:#fde8e8;color:#c0392b;display:block}
.result-meta{background:#fff;border-radius:8px 8px 0 0;
             border-bottom:2px solid #e0e8e0;padding:.65rem 1rem;
             display:none;font-size:.88rem;color:#444}
.result-meta strong{color:#2c4a2c}
.count-note{font-size:.78rem;color:#888;margin-left:1rem}
.table-wrap{overflow-x:auto;border-radius:0 0 8px 8px;
            box-shadow:0 1px 4px rgba(0,0,0,.1)}
table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:.88rem;background:#fff}
thead th{background:#2c4a2c;color:#fff;padding:.45rem .4rem;
          text-align:center;font-weight:600;white-space:nowrap;font-size:.8rem}
tbody tr{border-bottom:1px solid #eee}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:#f9fbf9}
tbody tr.selected{background:#fff3cd!important}
tbody tr.selected td{color:#7a5c00;font-weight:700}
td{padding:.42rem .4rem;text-align:center;white-space:nowrap}
.badge{display:inline-block;background:#ffc107;color:#533f03;font-size:.68rem;
       font-weight:700;padding:.1rem .38rem;border-radius:3px;
       margin-left:.35rem;vertical-align:middle}
</style>
</head>
<body>
<div class="container">
  <h1>Tree Lookup</h1>
  <p class="subtitle">Rangipo Accelerator Trial &mdash; 5 lower + 5 higher StressRatio neighbours within the same plot</p>
  <div class="card">
    <div class="controls">
      <div class="field">
        <label for="plotNo">Plot No</label>
        <input type="number" id="plotNo" min="1" max="144" placeholder="1 – 144">
      </div>
      <div class="field">
        <label for="treeNo">Tree No</label>
        <input type="number" id="treeNo" min="1" placeholder="e.g. 9">
      </div>
      <button id="findBtn">Find</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
  <div id="message"></div>
  <div id="resultMeta" class="result-meta"></div>
  <div class="table-wrap" id="tableContainer" style="display:none">
    <table>
      <thead>
        <tr>

          <th style="width:58px">DBH</th>
          <th style="width:48px">HT</th>
          <th style="width:72px">DamageZ</th>
          <th style="width:88px">StressRatio</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</div>

const forkExcluded=new Set();
DATA.forEach(r=>{if(r.Fork!=='A')forkExcluded.add(r.PlotNo+'_'+r.TreeNo);});

const msgEl   = document.getElementById('message');
const metaEl  = document.getElementById('resultMeta');
const tableEl = document.getElementById('tableContainer');
const tbody   = document.getElementById('resultsBody');

function showMsg(t,c){msgEl.textContent=t;msgEl.className=c;}
function clearMsg(){msgEl.textContent='';msgEl.className='';msgEl.style.display='none';}
function clearRes(){tableEl.style.display='none';metaEl.style.display='none';tbody.innerHTML='';}
function f1(v){return v==null?'—':v.toFixed(1);}
function f2(v){return v==null?'—':v.toFixed(2);}

function doSearch(){
  clearMsg();clearRes();
  const plotNo=parseInt(document.getElementById('plotNo').value,10);
  const treeNo=parseInt(document.getElementById('treeNo').value,10);
  if(!plotNo||!treeNo||isNaN(plotNo)||isNaN(treeNo)){
    showMsg('Please enter both a Plot No and a Tree No.','error');return;
  }
  const matches=DATA.filter(r=>r.PlotNo===plotNo&&r.TreeNo===treeNo);
  if(matches.length===0){
    showMsg('Tree '+treeNo+' not found in Plot '+plotNo+'.','error');return;
  }
  const sel=matches.find(r=>r.Fork==='A')||matches[0];
  const selSR=sel.StressRatio;

  const comp=DATA.filter(r=>
    r.PlotNo===plotNo&&r.TreeNo!==treeNo&&
    r.StressRatio!=null&&
    !forkExcluded.has(r.PlotNo+'_'+r.TreeNo)
  );
  comp.sort((a,b)=>a.StressRatio-b.StressRatio);

  let split=0;
  while(split<comp.length&&comp[split].StressRatio<selSR)split++;
  const lower=comp.slice(Math.max(0,split-5),split);
  const upper=comp.slice(split,split+5);
  const result=[...lower,sel,...upper];

  // Meta header: Plot + Clone (constant across results)
  let note=lower.length+' lower • selected • '+upper.length+' higher';
  if(lower.length<5||upper.length<5)note+=' — fewer than 5 available on one side';
  metaEl.innerHTML='<strong>Plot '+plotNo+'</strong> &nbsp;&middot;&nbsp; <strong>Clone: '+sel.Clone+'</strong><span class="count-note">'+note+'</span>';
  metaEl.style.display='block';

  result.forEach(r=>{
    const isSel=(r.PlotNo===plotNo&&r.TreeNo===treeNo);
    const tr=document.createElement('tr');
    if(isSel)tr.className='selected';
    tr.innerHTML=
      '<td>'+r.TreeNo+(isSel?'<span class="badge">&#10003;</span>':'')+'</td>'+
      '<td>'+f1(r.DBH)+'</td>'+
      '<td>'+f1(r.HT)+'</td>'+
      '<td>'+f1(r.DamageZ)+'</td>'+
      '<td>'+f2(r.StressRatio)+'</td>';
    tbody.appendChild(tr);
  });
  tableEl.style.display='block';
}

function doReset(){
  document.getElementById('plotNo').value='';
  document.getElementById('treeNo').value='';
  clearMsg();clearRes();
}

document.getElementById('findBtn').addEventListener('click',doSearch);
document.getElementById('resetBtn').addEventListener('click',doReset);
['plotNo','treeNo'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  el.addEventListener('input',()=>{clearMsg();clearRes();});
});
</script>
</body>
</html>
