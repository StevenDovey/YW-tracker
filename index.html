<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BNZ YouWealth</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --bg: #0a0e17; --surface: #111827; --border: #1e2d40;
    --accent: #00d4aa; --text: #e2e8f0; --muted: #64748b;
    --up: #00d4aa; --down: #ff4757;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; }

  /* Fund tab bar */
  .fund-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--surface); -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .fund-tabs::-webkit-scrollbar { display: none; }
  .fund-tab { flex: 0 0 auto; padding: 12px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; font-family: 'IBM Plex Mono', monospace; }
  .fund-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page { padding: 16px; }

  header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .fund-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  h1 { font-size: 20px; font-weight: 600; line-height: 1.2; }
  .last-updated { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }

  #price-display { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .price-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .price-value { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; }
  .price-change { font-family: 'IBM Plex Mono', monospace; font-size: 13px; margin-top: 2px; }
  .pos { color: var(--up); } .neg { color: var(--down); }

  .range-btns { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .range-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .range-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 16px; height: 220px; }

  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  tr { border-bottom: 1px solid var(--border); }
  tr:last-child { border-bottom: none; }
  td { padding: 9px 0; vertical-align: middle; }
  td:first-child { color: var(--muted); font-size: 12px; }
  td:last-child { text-align: right; font-weight: 600; }
  .divider-row td { padding-top: 12px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--border); border-bottom: 1px solid var(--border); }

  .refresh-btn { display: block; width: 100%; margin-top: 16px; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; cursor: pointer; }
  .refresh-btn:active { border-color: var(--accent); color: var(--accent); }

  #status { text-align: center; padding: 40px 16px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #content { display: none; }
</style>
</head>

  </div>
</div>

const FUND_CODES = {
  "High Growth Fund": "BNZ2112009",
  "Growth Fund": "BNZ2112008",
  "Balanced Fund": "BNZ2112007",
  "Moderate Fund": "BNZ2112010",
  "Conservative Fund": "BNZ2112011",
};


let currentFund = FUND_ORDER[0];
let allPrices = {};   // fund -> [{date, price}]
let chart = null;
let activeRange = 365;

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtDate(d) { return d.toISOString().slice(0,10); }
function isWeekend(d) { return d.getDay()===0 || d.getDay()===6; }

async function fetchDay(fundCode, dateStr) {
  const url = `https://api.bnz.co.nz/v1/fundunitprices?date=${dateStr}&fundProduct=retailManagedFund`;
  try {
    const res = await fetch(url, { headers: { ApiKey: API_KEY } });
    if (!res.ok) return null;
    const json = await res.json();
    const entry = (json.fundUnitPrices||[]).find(f => f.fundCode === fundCode);
    if (!entry) return null;
    return { date: dateStr, price: parseFloat(entry.sellPrice.amount) };
  } catch { return null; }
}

async function loadFund(fundName) {
  const cacheKey = "bnz_v3_" + fundName.replace(/ /g,"_");
  let cached = [];
  try { cached = JSON.parse(localStorage.getItem(cacheKey)||"[]"); } catch {}

  // Base from embedded data
  let prices = FUND_DATA[fundName].map(([date,price]) => ({date,price}));
  const dateMap = new Map(prices.map(p => [p.date, p.price]));
  cached.forEach(p => dateMap.set(p.date, p.price));

  const lastDate = [...dateMap.keys()].sort().pop();
  const today = new Date(); today.setHours(0,0,0,0);
  const fetchFrom = new Date(lastDate); fetchFrom.setDate(fetchFrom.getDate()+1);

  if (fetchFrom <= today) {
    const code = FUND_CODES[fundName];
    const newPrices = [];
    let d = new Date(fetchFrom);
    while (d <= today) {
      if (!isWeekend(d)) {
        const ds = fmtDate(d);
        const r = await fetchDay(code, ds);
        if (r) { newPrices.push(r); dateMap.set(ds, r.price); }
      }
      d.setDate(d.getDate()+1);
    }
    if (newPrices.length > 0) {
      const allCached = [...cached, ...newPrices].filter((p,i,a) => a.findIndex(x=>x.date===p.date)===i);
      try { localStorage.setItem(cacheKey, JSON.stringify(allCached)); } catch {}
    }
  }

  return Array.from(dateMap.entries()).map(([date,price]) => ({date,price})).sort((a,b) => a.date.localeCompare(b.date));
}

function cumReturn(p0, p1) { return (!p0||!p1) ? null : (p1/p0-1)*100; }
function annReturn(p0, p1, days) { return (!p0||!p1||days<=0) ? null : (Math.pow(p1/p0,365.25/days)-1)*100; }
function priceAt(prices, targetDate) { const td=fmtDate(targetDate); const r=prices.find(p=>p.date>=td); return r?r.price:null; }
function fmt(v) { if(v===null||isNaN(v)) return "n/a"; return (v>=0?"+":"−")+Math.abs(v).toFixed(2)+"%"; }
function cls(v) { return v===null?"":v>=0?"pos":"neg"; }

function renderFund(fundName) {
  const prices = allPrices[fundName];
  if (!prices || prices.length === 0) return;

  const latest = prices[prices.length-1];
  const prev = prices[prices.length-2];
  const p1 = latest.price;
  const today = new Date(latest.date);

  // Header
  document.getElementById("fund-title").textContent = FUND_LABELS[fundName];
  document.getElementById("last-updated").innerHTML = `As at<br>${latest.date}`;
  document.getElementById("latest-price").textContent = p1.toFixed(4);

  if (prev) {
    const d = p1 - prev.price;
    const p = (d/prev.price)*100;
    const sign = d>=0?"+":"−";
    const c = d>=0?"pos":"neg";
    document.getElementById("day-change").innerHTML = `<span class="${c}">${sign}${Math.abs(d).toFixed(4)}</span>`;
    document.getElementById("price-change").innerHTML = `<span class="${c}">${sign}${Math.abs(p).toFixed(2)}%</span> vs prev`;
  }

  // Table
  const rows = [
    { label: "1 week",   val: cumReturn(priceAt(prices,addDays(today,-7)),   p1) },
    { label: "1 month",  val: cumReturn(priceAt(prices,addDays(today,-30)),  p1) },
    { label: "3 months", val: cumReturn(priceAt(prices,addDays(today,-91)),  p1) },
    { label: "6 months", val: cumReturn(priceAt(prices,addDays(today,-182)), p1) },
    { label: "1 year",   val: cumReturn(priceAt(prices,addDays(today,-365)), p1) },
    null,
    { label: "3 years (p.a.)", val: annReturn(priceAt(prices,addDays(today,-3*365.25)), p1, 3*365.25) },
    { label: "5 years (p.a.)", val: annReturn(priceAt(prices,addDays(today,-5*365.25)), p1, 5*365.25) },
    { label: "7 years (p.a.)", val: annReturn(priceAt(prices,addDays(today,-7*365.25)), p1, 7*365.25) },
    { label: "Since inception (p.a.)", val: annReturn(prices[0].price, p1, (today-new Date(prices[0].date))/86400000) },
  ];
  document.getElementById("summary-table").innerHTML = rows.map(r =>
    r===null
      ? `<tr class="divider-row"><td colspan="2">annualised</td></tr>`
      : `<tr><td>${r.label}</td><td class="${cls(r.val)}">${fmt(r.val)}</td></tr>`
  ).join("");

  // Chart
  buildChart(prices, activeRange);
}

function buildChart(prices, days) {
  const latest = prices[prices.length-1];
  const today = new Date(latest.date);
  const from = days===0 ? new Date(prices[0].date) : addDays(today,-days);
  const slice = prices.filter(p => p.date >= fmtDate(from));
  const labels = slice.map(p => p.date);
  const data = slice.map(p => p.price);
  const rising = data[data.length-1] >= data[0];
  const colour = rising ? "#00d4aa" : "#ff4757";
  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.data.datasets[0].borderColor = colour;
    chart.data.datasets[0].backgroundColor = colour+"18";
    chart.update("none");
  } else {
    chart = new Chart(document.getElementById("chart").getContext("2d"), {
      type: "line",
      data: { labels, datasets: [{ data, borderColor: colour, backgroundColor: colour+"18", borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.2 }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend:{display:false}, tooltip:{ mode:"index", intersect:false,
          callbacks:{label:c=>" "+c.parsed.y.toFixed(4), title:c=>c[0].label},
          backgroundColor:"#1e2d40",titleColor:"#64748b",bodyColor:"#e2e8f0",borderColor:"#1e2d40",borderWidth:1}},
        scales:{
          x:{ticks:{color:"#64748b",font:{family:"IBM Plex Mono",size:10},maxTicksLimit:6,maxRotation:0},grid:{color:"#1e2d40"}},
          y:{ticks:{color:"#64748b",font:{family:"IBM Plex Mono",size:10},maxTicksLimit:5},grid:{color:"#1e2d40"}}
        }
      }
    });
  }
}

function switchFund(fundName) {
  currentFund = fundName;
  document.querySelectorAll(".fund-tab").forEach(t => t.classList.toggle("active", t.dataset.fund===fundName));
  if (allPrices[fundName]) {
    renderFund(fundName);
  } else {
    loadFund(fundName).then(p => { allPrices[fundName]=p; renderFund(fundName); });
  }
}

document.querySelectorAll(".range-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeRange = parseInt(btn.dataset.days);
    if (allPrices[currentFund]) buildChart(allPrices[currentFund], activeRange);
  });
});

async function refresh() {
  FUND_ORDER.forEach(f => {
    try { localStorage.removeItem("bnz_v3_"+f.replace(/ /g,"_")); } catch {}
  });
  allPrices = {};
  await init();
}

async function init() {
  document.getElementById("status").style.display = "block";
  document.getElementById("content").style.display = "none";

  // Build tabs
  const tabBar = document.getElementById("fund-tabs");
  tabBar.innerHTML = FUND_ORDER.map(f =>
    `<div class="fund-tab${f===currentFund?" active":""}" data-fund="${f}" onclick="switchFund('${f}')">${FUND_LABELS[f]}</div>`
  ).join("");

  try {
    // Load first fund immediately
    allPrices[currentFund] = await loadFund(currentFund);
    document.getElementById("status").style.display = "none";
    document.getElementById("content").style.display = "block";
    renderFund(currentFund);

    // Load remaining funds in background
    for (const f of FUND_ORDER) {
      if (f !== currentFund) {
        loadFund(f).then(p => { allPrices[f] = p; });
      }
    }
  } catch(e) {
    document.getElementById("status").innerHTML = `⚠ Error: ${e.message}`;
  }
}

init();
</script>
