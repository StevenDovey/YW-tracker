let allPrices = [];
let chart = null;
let activeRange = 365;

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtDate(d) { return d.toISOString().slice(0,10); }
function isWeekend(d) { const day = d.getDay(); return day === 0 || day === 6; }

async function fetchDay(dateStr) {
  const url = `https://api.bnz.co.nz/v1/fundunitprices?date=${dateStr}&fundProduct=retailManagedFund`;
  try {
    const res = await fetch(url, { headers: { ApiKey: API_KEY } });
    if (!res.ok) return null;
    const json = await res.json();
    const entry = (json.fundUnitPrices || []).find(f => f.fundCode === FUND_CODE);
    if (!entry) return null;
    const sell = parseFloat(entry.sellPrice.amount);
    return { date: dateStr, price: sell };
  } catch { return null; }
}

async function loadPrices() {
  // Start from historical data
  let prices = HISTORICAL.map(([date, price]) => ({ date, price }));

  // Check cache for anything newer
  let cached = [];
  try { cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "[]"); } catch {}

  // Merge cache into prices
  const dateMap = new Map(prices.map(p => [p.date, p.price]));
  cached.forEach(p => dateMap.set(p.date, p.price));

  // Find what's missing after last historical date
  const lastHistorical = prices[prices.length - 1].date;
  const today = new Date(); today.setHours(0,0,0,0);
  const lastCached = cached.length ? cached[cached.length-1].date : lastHistorical;
  const fetchFrom = new Date(lastCached); fetchFrom.setDate(fetchFrom.getDate() + 1);

  if (fetchFrom <= today) {
    document.getElementById("status").innerHTML = '<div class="spinner"></div><br>Fetching new prices…';
    const newPrices = [];
    let d = new Date(fetchFrom);
    while (d <= today) {
      if (!isWeekend(d)) {
        const ds = fmtDate(d);
        const r = await fetchDay(ds);
        if (r) { newPrices.push(r); dateMap.set(ds, r.price); }
      }
      d.setDate(d.getDate() + 1);
    }
    if (newPrices.length > 0) {
      const allCached = [...cached, ...newPrices].filter((p,i,a) => a.findIndex(x=>x.date===p.date)===i);
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(allCached)); } catch {}
    }
  }

  return Array.from(dateMap.entries()).map(([date,price]) => ({date,price})).sort((a,b) => a.date.localeCompare(b.date));
}

function cumReturn(p0, p1) {
  if (!p0 || !p1) return null;
  return (p1 / p0 - 1) * 100;
}
function annReturn(p0, p1, days) {
  if (!p0 || !p1 || days <= 0) return null;
  return (Math.pow(p1 / p0, 365.25 / days) - 1) * 100;
}
function priceAt(prices, targetDate) {
  const td = fmtDate(targetDate);
  const r = prices.find(p => p.date >= td);
  return r ? r.price : null;
}
function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return "n/a";
  const s = Math.abs(v).toFixed(2);
  return (v >= 0 ? "+" : "−") + s + "%";
}
function cls(v) { return v === null ? "" : v >= 0 ? "pos" : "neg"; }

function buildTable(prices) {
  const latest = prices[prices.length - 1];
  const p1 = latest.price;
  const today = new Date(latest.date);
  const rows = [
    { label: "1 week",   val: cumReturn(priceAt(prices, addDays(today,-7)),   p1) },
    { label: "1 month",  val: cumReturn(priceAt(prices, addDays(today,-30)),  p1) },
    { label: "3 months", val: cumReturn(priceAt(prices, addDays(today,-91)),  p1) },
    { label: "6 months", val: cumReturn(priceAt(prices, addDays(today,-182)), p1) },
    { label: "1 year",   val: cumReturn(priceAt(prices, addDays(today,-365)), p1) },
    null,
    { label: "3 years (p.a.)", val: annReturn(priceAt(prices, addDays(today,-3*365.25)), p1, 3*365.25) },
    { label: "5 years (p.a.)", val: annReturn(priceAt(prices, addDays(today,-5*365.25)), p1, 5*365.25) },
    { label: "Since inception (p.a.)", val: annReturn(prices[0].price, p1, (today-new Date(prices[0].date))/86400000) },
  ];
  document.getElementById("summary-table").innerHTML = rows.map(r =>
    r === null
      ? `<tr class="divider-row"><td colspan="2">annualised</td></tr>`
      : `<tr><td>${r.label}</td><td class="${cls(r.val)}">${fmt(r.val)}</td></tr>`
  ).join("");
}

function buildChart(prices, days) {
  const latest = prices[prices.length-1];
  const today = new Date(latest.date);
  const from = days === 0 ? new Date(prices[0].date) : addDays(today, -days);
  const slice = prices.filter(p => p.date >= fmtDate(from));
  const labels = slice.map(p => p.date);
  const data = slice.map(p => p.price);
  const rising = data[data.length-1] >= data[0];
  const colour = rising ? "#00d4aa" : "#ff4757";
  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.data.datasets[0].borderColor = colour;
    chart.data.datasets[0].backgroundColor = colour + "18";
    chart.update("none");
  } else {
    chart = new Chart(document.getElementById("chart").getContext("2d"), {
      type: "line",
      data: { labels, datasets: [{ data, borderColor: colour, backgroundColor: colour+"18", borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.2 }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false }, tooltip: { mode: "index", intersect: false,
          callbacks: { label: c => " "+c.parsed.y.toFixed(4), title: c => c[0].label },
          backgroundColor: "#1e2d40", titleColor: "#64748b", bodyColor: "#e2e8f0", borderColor: "#1e2d40", borderWidth: 1 }},
        scales: {
          x: { ticks: { color:"#64748b", font:{family:"IBM Plex Mono",size:10}, maxTicksLimit:6, maxRotation:0 }, grid:{color:"#1e2d40"} },
          y: { ticks: { color:"#64748b", font:{family:"IBM Plex Mono",size:10}, maxTicksLimit:5 }, grid:{color:"#1e2d40"} }
        }
      }
    });
  }
}

function buildHeader(prices) {
  const latest = prices[prices.length-1];
  const prev = prices[prices.length-2];
  document.getElementById("latest-price").textContent = latest.price.toFixed(4);
  document.getElementById("last-updated").innerHTML = `As at<br>${latest.date}`;
  if (prev) {
    const d = latest.price - prev.price;
    const p = (d / prev.price) * 100;
    const sign = d >= 0 ? "+" : "−";
    const c = d >= 0 ? "pos" : "neg";
    document.getElementById("day-change").innerHTML = `<span class="${c}">${sign}${Math.abs(d).toFixed(4)}</span>`;
    document.getElementById("price-change").innerHTML = `<span class="${c}">${sign}${Math.abs(p).toFixed(2)}%</span> vs prev`;
  }
}

document.querySelectorAll(".range-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeRange = parseInt(btn.dataset.days);
    buildChart(allPrices, activeRange);
  });
});

async function refresh() {
  document.getElementById("content").style.display = "none";
  document.getElementById("status").style.display = "block";
  // Clear cache to force re-fetch of recent days
  try { localStorage.removeItem(CACHE_KEY); } catch {}
  await init();
}

async function init() {
  document.getElementById("status").style.display = "block";
  document.getElementById("content").style.display = "none";
  try {
    allPrices = await loadPrices();
    buildHeader(allPrices);
    buildTable(allPrices);
    buildChart(allPrices, activeRange);
    document.getElementById("status").style.display = "none";
    document.getElementById("content").style.display = "block";
  } catch(e) {
    document.getElementById("status").innerHTML = `⚠ Error: ${e.message}`;
  }
}

init();
</script>
