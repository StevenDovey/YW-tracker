    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --border: #1e2d40;
      --accent: #00d4aa;
      --text: #e2e8f0;
      --muted: #64748b;
      --up: #00d4aa;
      --down: #ff4757;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 20px; min-width: 0; }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .header-title h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .header-title .subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    .status-bar {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-bar .accent { color: var(--accent); }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }


    .progress-wrap {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.25s;
      width: 0%;
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .col-header {
      display: grid;
      grid-template-columns: 44px 1fr 76px 180px 86px 200px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      align-items: center;
    }
    .col-header > * { padding: 0 6px; }
    .col-header > *:first-child { padding-left: 0; text-align: center; }
    .col-header > *:nth-child(3),
    .col-header > *:nth-child(5) { text-align: right; }

    .holding-row {
      display: grid;
      grid-template-columns: 44px 1fr 76px 180px 86px 200px;
      padding: 7px 16px;
      border-bottom: 1px solid rgba(30,45,64,0.45);
      align-items: center;
      transition: background 0.12s;
    }
    .holding-row:hover { background: rgba(255,255,255,0.025); }
    .holding-row:last-child { border-bottom: none; }
    .holding-row > * { padding: 0 6px; }

    .rank {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding-left: 0 !important;
    }
    .name-cell { min-width: 0; }
    .company-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .ticker-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }
    .weight-pct {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-align: right;
    }
    .bar-cell { display: flex; align-items: center; gap: 8px; }
    .bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.65;
    }
    .ret-cell {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
    }
    .ret-cell.up   { color: var(--up); }
    .ret-cell.down { color: var(--down); }
    .ret-cell.pending { color: var(--muted); font-size: 10px; }
    .ret-cell.na { color: var(--muted); }

    .chart-cell { height: 48px; position: relative; }
    .chart-cell canvas { display: block; width: 100% !important; height: 48px !important; }

    @media (max-width: 1000px) {
      .col-header, .holding-row {
        grid-template-columns: 40px 1fr 72px 140px 78px 160px;
      }
    }
    @media (max-width: 720px) {
      .container { padding: 16px 12px; }
      .col-header { display: none; }
      .holding-row {
        grid-template-columns: 36px 1fr 68px 68px 130px;
      }
      .bar-cell { display: none; }
      .chart-cell { height: 42px; }
      .chart-cell canvas { height: 42px !important; }
    }
    @media (max-width: 480px) {
      .holding-row {
        grid-template-columns: 30px 1fr 62px 58px 110px;
        padding: 6px 8px;
      }
      .company-name { font-size: 12px; }
    }
  </style>

const MAX_WEIGHT = HOLDINGS[0].weight;
const TOTAL_WEIGHT = HOLDINGS.reduce((s, h) => s + h.weight, 0);
let loadedCount = 0;
const N = HOLDINGS.length;

document.getElementById('total-count').textContent = N;

function buildRows() {
  const frag = document.createDocumentFragment();
  HOLDINGS.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'holding-row';
    const barW = (h.weight / MAX_WEIGHT * 100).toFixed(2);
    row.innerHTML =
      `<div class="rank">${i + 1}</div>` +
      `<div class="name-cell">` +
        `<div class="company-name" title="${h.name}">${h.name}</div>` +
        `<div class="ticker-label">${h.ticker}</div>` +
      `</div>` +
      `<div class="weight-pct">${h.weight.toFixed(2)}%</div>` +
      `<div class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${barW}%"></div></div></div>` +
      `<div class="ret-cell pending" id="ret${i}">…</div>` +
      `<div class="chart-cell" id="cc${i}"><canvas id="cv${i}" height="48"></canvas></div>`;
    frag.appendChild(row);
  });
  document.getElementById('holdings-list').appendChild(frag);
}

buildRows();

const YAHOO = 'https://query1.finance.yahoo.com/v8/finance/chart/';
const chartInstances = {};

async function fetchTicker(ticker) {
  const url = `${YAHOO}${encodeURIComponent(ticker)}?range=1y&interval=1wk`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const res = j.chart?.result?.[0];
    if (!res) return null;
    const closes = res.indicators?.quote?.[0]?.close ?? [];
    const ts = res.timestamp ?? [];
    const pts = [];
    for (let k = 0; k < ts.length; k++) {
      if (closes[k] != null) pts.push(closes[k]);
    }
    return pts.length >= 2 ? pts : null;
  } catch {
    return null;
  }
}

function drawSparkline(id, pts, isUp) {
  const canvas = document.getElementById('cv' + id);
  if (!canvas) return;
  const color = isUp ? '#00d4aa' : '#ff4757';
  if (chartInstances[id]) chartInstances[id].destroy();
  chartInstances[id] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: pts.map((_, k) => k),
      datasets: [{
        data: pts,
        borderColor: color,
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
        backgroundColor: isUp ? 'rgba(0,212,170,0.12)' : 'rgba(255,71,87,0.12)',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } },
      layout: { padding: 2 }
    }
  });
}

async function loadHolding(i) {
  const pts = await fetchTicker(HOLDINGS[i].ticker);
  loadedCount++;
  document.getElementById('loaded-count').textContent = loadedCount;
  document.getElementById('progress-fill').style.width = (loadedCount / N * 100) + '%';

  const retEl = document.getElementById('ret' + i);
  if (!pts) {
    retEl.textContent = 'n/a';
    retEl.className = 'ret-cell na';
    return;
  }
  const ret = (pts[pts.length - 1] - pts[0]) / pts[0] * 100;
  const isUp = ret >= 0;
  retEl.textContent = (isUp ? '+' : '') + ret.toFixed(1) + '%';
  retEl.className = 'ret-cell ' + (isUp ? 'up' : 'down');
  drawSparkline(i, pts, isUp);
}

async function loadAll() {
  const BATCH = 8;
  for (let i = 0; i < N; i += BATCH) {
    const end = Math.min(i + BATCH, N);
    const batch = [];
    for (let j = i; j < end; j++) batch.push(loadHolding(j));
    await Promise.all(batch);
    if (end < N) await new Promise(r => setTimeout(r, 250));
  }
}
