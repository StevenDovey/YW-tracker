      font-weight: 600;

  const frag = document.createDocumentFragment();
  HOLDINGS.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'holding-row';
    row.onclick = () => openDetail(i);
    const barW = (h.weight / MAX_WEIGHT * 100).toFixed(2);
    row.innerHTML =
      `<div class="rank">${i + 1}</div>` +
      `<div class="name-cell">` +
        `<div class="company-name" title="${h.name}">${h.name}</div>` +
        `<div class="ticker-label">${h.ticker}</div>` +
      `</div>` +
      `<div class="weight-pct">${h.weight.toFixed(2)}%</div>` +
      `<div class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${barW}%"></div></div></div>` +
      `<div class="ret-cell pending" id="ret${i}">…</div>` +
      `<div class="chart-cell" id="cc${i}"><canvas id="cv${i}" height="44"></canvas><div class="date-label" id="dt${i}"></div></div>`;
    frag.appendChild(row);
  });
  document.getElementById('holdings-list').appendChild(frag);
}

buildRows();

const YAHOO_BASE = 'https://query1.finance.yahoo.com/v8/finance/chart/';
const PROXY = 'https://corsproxy.io/?';
const chartInstances = {};

const priceCache = {};  // index -> { pts, lastDate }
let activeListWeeks = 52;

document.querySelectorAll('.list-range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.list-range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeListWeeks = parseInt(btn.dataset.weeks);
    redrawAll();
  });
});

function redrawAll() {
  let wSum = 0, wTotal = 0;
  for (let i = 0; i < N; i++) {
    const cache = priceCache[i];
    if (!cache) continue;
    const sliced = cache.pts.slice(-activeListWeeks);
    if (sliced.length < 2) continue;
    const ret = (sliced[sliced.length-1] - sliced[0]) / sliced[0] * 100;
    const isUp = ret >= 0;
    const retEl = document.getElementById('ret' + i);
    retEl.textContent = (isUp ? '+' : '') + ret.toFixed(1) + '%';
    retEl.className = 'ret-cell ' + (isUp ? 'up' : 'down');
    drawSparkline(i, sliced, isUp);
    wSum += ret * HOLDINGS[i].weight;
    wTotal += HOLDINGS[i].weight;
  }
  updateWeightedReturn(wSum, wTotal);
}

function updateWeightedReturn(wSum, wTotal) {
  if (wTotal === 0) return;
  const wr = wSum / wTotal;
  const el = document.getElementById('wr-val');
  el.textContent = (wr >= 0 ? '+' : '') + wr.toFixed(2) + '%';
  el.className = 'wr-val ' + (wr >= 0 ? 'up' : 'down');
  buildWeightedChart();
}

let indexChart = null;
function buildWeightedChart() {
  // Build normalised weighted index series
  // For each loaded holding, get slice, normalise to start=1, weight it
  const series = [];
  let minLen = Infinity;
  for (let i = 0; i < N; i++) {
    const c = priceCache[i];
    if (!c) continue;
    const s = c.pts.slice(-activeListWeeks);
    if (s.length < 2 || s[0] === 0) continue;
    series.push({ norm: s.map(v => v / s[0]), weight: HOLDINGS[i].weight });
    if (s.length < minLen) minLen = s.length;
  }
  if (series.length === 0 || minLen < 2) return;

  // Weighted average at each time step
  const totalW = series.reduce((a, s) => a + s.weight, 0);
  const indexPts = Array.from({ length: minLen }, (_, t) => {
    const val = series.reduce((a, s) => a + s.norm[s.norm.length - minLen + t] * s.weight, 0) / totalW;
    return (val - 1) * 100; // as % return from start
  });

  const rising = indexPts[indexPts.length - 1] >= 0;
  const color = rising ? '#00d4aa' : '#ff4757';
  const labels = Array.from({ length: minLen }, (_, i) => i);

  if (indexChart) {
    indexChart.data.labels = labels;
    indexChart.data.datasets[0].data = indexPts;
    indexChart.data.datasets[0].borderColor = color;
    indexChart.data.datasets[0].backgroundColor = rising ? 'rgba(0,212,170,0.1)' : 'rgba(255,71,87,0.1)';
    indexChart.update('none');
  } else {
    indexChart = new Chart(document.getElementById('index-chart').getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: indexPts,
          borderColor: color,
          backgroundColor: rising ? 'rgba(0,212,170,0.1)' : 'rgba(255,71,87,0.1)',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            mode: 'index', intersect: false,
            callbacks: {
              label: c => (c.parsed.y >= 0 ? '+' : '') + c.parsed.y.toFixed(2) + '%',
              title: () => ''
            },
            backgroundColor: '#1e2d40', bodyColor: '#e2e8f0', borderColor: '#1e2d40', borderWidth: 1
          }
        },
        scales: {
          x: { display: false },
          y: {
            ticks: { color: '#64748b', font: { family: 'IBM Plex Mono', size: 10 }, maxTicksLimit: 4,
              callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%' },
            grid: { color: '#1e2d40' },
            position: 'right'
          }
        }
      }
    });
  }
}
let modalChart = null;
let modalActiveWeeks = 52;

document.querySelectorAll('.modal-range-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.modal-range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    modalActiveWeeks = parseInt(btn.dataset.weeks);
    const idx = parseInt(document.getElementById('modal-overlay').dataset.idx);
    if (priceCache[idx]) drawModalChart(priceCache[idx].pts);
  });
});

function openDetail(i) {
  const h = HOLDINGS[i];
  document.getElementById('modal-name').textContent = h.name;
  document.getElementById('modal-ticker').textContent = h.ticker + '  ·  ' + h.weight.toFixed(2) + '% of fund';
  document.getElementById('modal-weight').textContent = h.weight.toFixed(2) + '%';
  const retEl = document.getElementById('ret' + i);
  const retVal = document.getElementById('modal-return');
  retVal.textContent = retEl.textContent;
  retVal.className = 'val ' + (retEl.classList.contains('up') ? 'up' : retEl.classList.contains('down') ? 'down' : '');
  const overlay = document.getElementById('modal-overlay');
  overlay.dataset.idx = i;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Reset to 1Y
  modalActiveWeeks = 52;
  document.querySelectorAll('.modal-range-btn').forEach(b => b.classList.toggle('active', b.dataset.weeks === '52'));
  if (priceCache[i]) {
    drawModalChart(priceCache[i].pts);
  } else {
    if (modalChart) { modalChart.destroy(); modalChart = null; }
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function drawModalChart(pts) {
  const slice = pts.slice(-modalActiveWeeks);
  const isUp = slice[slice.length-1] >= slice[0];
  const color = isUp ? '#00d4aa' : '#ff4757';
  const canvas = document.getElementById('modal-canvas');
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  modalChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: slice.map((_, k) => k),
      datasets: [{
        data: slice,
        borderColor: color,
        backgroundColor: isUp ? 'rgba(0,212,170,0.12)' : 'rgba(255,71,87,0.12)',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: { label: c => ' ' + c.parsed.y.toFixed(2), title: () => '' },
          backgroundColor: '#1e2d40', bodyColor: '#e2e8f0', borderColor: '#1e2d40', borderWidth: 1
        }
      },
      scales: {
        x: { display: false },
        y: { ticks: { color: '#64748b', font: { family: 'IBM Plex Mono', size: 10 }, maxTicksLimit: 4 }, grid: { color: '#1e2d40' }, position: 'right' }
      }
    }
  });
}


async function fetchTicker(ticker) {
  const yf = `${YAHOO_BASE}${encodeURIComponent(ticker)}?range=2y&interval=1wk`;
  const url = PROXY + encodeURIComponent(yf);
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const res = j.chart?.result?.[0];
    if (!res) return null;
    const closes = res.indicators?.quote?.[0]?.close ?? [];
    const ts = res.timestamp ?? [];
    const pts = [], dates = [];
    for (let k = 0; k < ts.length; k++) {
      if (closes[k] != null) {
        pts.push(closes[k]);
        dates.push(new Date(ts[k] * 1000).toISOString().slice(0,10));
      }
    }
    if (pts.length < 2) return null;
    return { pts, lastDate: dates[dates.length - 1] };
  } catch {
    return null;
  }
}

function drawSparkline(id, pts, isUp) {
  const canvas = document.getElementById('cv' + id);
  if (!canvas) return;
  const color = isUp ? '#00d4aa' : '#ff4757';
  if (chartInstances[id]) chartInstances[id].destroy();
  chartInstances[id] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: pts.map((_, k) => k),
      datasets: [{
        data: pts,
        borderColor: color,
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
        backgroundColor: isUp ? 'rgba(0,212,170,0.12)' : 'rgba(255,71,87,0.12)',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } },
      layout: { padding: 2 }
    }
  });
}

async function loadHolding(i) {
  const result = await fetchTicker(HOLDINGS[i].ticker);
  loadedCount++;
  document.getElementById('loaded-count').textContent = loadedCount;
  document.getElementById('progress-fill').style.width = (loadedCount / N * 100) + '%';

  const retEl = document.getElementById('ret' + i);
  if (!result) {
    retEl.textContent = 'n/a';
    retEl.className = 'ret-cell na';
    return;
  }
  priceCache[i] = result;
  const sliced = result.pts.slice(-activeListWeeks);
  const ret = (sliced[sliced.length-1] - sliced[0]) / sliced[0] * 100;
  const isUp = ret >= 0;
  retEl.textContent = (isUp ? '+' : '') + ret.toFixed(1) + '%';
  retEl.className = 'ret-cell ' + (isUp ? 'up' : 'down');
  drawSparkline(i, sliced, isUp);
  const dtEl = document.getElementById('dt' + i);
  if (dtEl) dtEl.textContent = result.lastDate;
  // update weighted return live as data arrives
  let wSum = 0, wTotal = 0;
  for (let j = 0; j < N; j++) {
    const c = priceCache[j];
    if (!c) continue;
    const s = c.pts.slice(-activeListWeeks);
    if (s.length < 2) continue;
    const r = (s[s.length-1] - s[0]) / s[0] * 100;
    wSum += r * HOLDINGS[j].weight;
    wTotal += HOLDINGS[j].weight;
  }
  updateWeightedReturn(wSum, wTotal);
}

async function loadAll() {
  const BATCH = 8;
  for (let i = 0; i < N; i += BATCH) {
    const end = Math.min(i + BATCH, N);
    const batch = [];
    for (let j = i; j < end; j++) batch.push(loadHolding(j));
    await Promise.all(batch);
    if (end < N) await new Promise(r => setTimeout(r, 250));
  }
}

loadAll();
</script>
